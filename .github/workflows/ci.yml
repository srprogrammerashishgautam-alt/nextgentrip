name: CI

on:
  push:
    branches: [main, "codex/**", "module/**"]
  pull_request:
    branches: [main]

jobs:
  php:
    name: PHP checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, intl, pdo_pgsql, redis
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Lint
        run: vendor/bin/pint --test
      - name: Test
        run: php artisan test

  deploy-placeholder:
    name: ECS deploy placeholder
    runs-on: ubuntu-latest
    needs: php
    if: github.ref == 'refs/heads/main'
    steps:
      - run: echo "Build Docker image, push to ECR, and deploy to AWS ECS after credentials are configured."
